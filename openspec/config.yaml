schema: spec-driven

context: |
  Two-module Go project:
    1. Madokita (fighting game) â€” root module
    2. animprite (animation editor) â€” submodule at animprite/

  Tech stack: Go 1.26.4, Ebitengine/v2 v2.9.9
  Architecture: ECS-influenced, scene-based, phase-driven runtime (PRE_INITâ†’INITâ†’POST_INITâ†’READYâ†’RUNNINGâ†’SHUTDOWN)
  Testing: None yet (fresh migration from TypeScript/Phaser/Electron)
  Style: Modular engine-oriented, Go-first, platform-abstraction via platform.API

  Quick Reference â€” key files & patterns:

  Engine: internal/engine/
    Runtime: Phase-driven lifecycle (PhasePreInitâ†’PhaseInitâ†’PhasePostInitâ†’PhaseReadyâ†’PhaseRunningâ†’PhaseShutdown)
    Systems: SystemManager (optional hooks: Initialize/Start/Ready/Shutdown)
    DI: Container via Register(key, svc) pattern (events, input, platform)
    Entry: cmd/game/main.go â†’ NewGameApp() â†’ runtime.Initialize â†’ ebiten.RunGame
    Platform: platform.API interface â†’ platform.NewDesktop()
    Scenes: scene.Manager (Addâ†’SwitchTo), Scene interface (Update/Draw/Enter/Exit/Pause/Resume/IsActive)
    Input: input.Manager
    Events: event.Bus (typed pub/sub)

  Combat: internal/combat/
    CollisionSystem: frame overlap check (hitboxâ†”hurtbox), team filtering
    CombatActor: team/stats/hurtboxes â€” stagger, invincibility, hyper armor, death
