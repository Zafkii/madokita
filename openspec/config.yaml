  Persistence: internal/save/, internal/settings/
    SaveManager (SQLite), SettingsManager (SQLite)

  Debug/Math: internal/math/ (vector, rect)

  Editor (animprite/):
    - Standalone Ebitengine app, independent Go module
    - Immediate-mode vector UI (no widget tree)
    - Visual layer complete: title bar, camera, canvas, dark/light theme, 4 data tables, right panel inputs, preview UI
    - Functionality pending: sprite loading, canvas rendering, hitbox/hurtbox interaction, preview playback, Open/Save, undo/redo

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns: RuntimeSystem lifecycle, EventBus, platform.API
    tdd: false
    test_command: "go test ./..."
  verify:
    test_command: "go test ./..."
    build_command: "go build ./cmd/game"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
